[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Required libraries
lib_deps = 
    ESP32Encoder@^0.11.6
    ESP Async WebServer@^1.2.4
    AsyncTCP@^1.1.4
    ArduinoJson@^7.0.4
    Preferences@^2.1.0

; Upload settings
upload_speed = 921600
upload_port = COM6  ; Change to your port

; Filesystem for web files (optional SPIFFS/LittleFS)
; board_build.filesystem = littlefs
; board_build.partitions = min_spiffs.csv
